name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  # Client ID of the org's prebuilt NetSuite integration record, embedded into release
  # binaries so `account add` works without --client-id. Set it once as a repository
  # variable (Settings > Secrets and variables > Actions > Variables) — it's a public
  # OAuth client identifier, not a secret. Unset, builds still work; --client-id is
  # simply required again.
  NETSUITE_CLI_BUILTIN_CLIENT_ID: ${{ vars.NETSUITE_CLI_BUILTIN_CLIENT_ID }}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - run: cargo build --release --target ${{ matrix.target }}

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          cd target/${{ matrix.target }}/release
          zip netsuite-cli-${{ github.ref_name }}-${{ matrix.target }}.zip netsuite-cli
          mv netsuite-cli-${{ github.ref_name }}-${{ matrix.target }}.zip "$GITHUB_WORKSPACE"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/netsuite-cli.exe" -DestinationPath "netsuite-cli-${{ github.ref_name }}-${{ matrix.target }}.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: netsuite-cli-${{ matrix.target }}
          path: netsuite-cli-${{ github.ref_name }}-${{ matrix.target }}.zip
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
